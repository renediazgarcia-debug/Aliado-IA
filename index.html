<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aliado IA</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0a0a14;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  #header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#111827;border-bottom:1px solid #1f2937;flex-shrink:0}
  #header-left{display:flex;align-items:center;gap:10px}
  #logo{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px}
  #title{font-weight:700;font-size:14px}
  #subtitle{font-size:11px;color:#9ca3af}
  #header-right{display:flex;gap:8px}
  .hbtn{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid #4b5563;background:transparent;color:#d1d5db;cursor:pointer}
  .hbtn:hover{background:#1f2937}
  #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  #welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:20px}
  #welcome-icon{font-size:48px}
  #welcome-sub{color:#9ca3af;font-size:13px;text-align:center;max-width:280px}
  #starters{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px}
  .starter{text-align:left;padding:12px 16px;border-radius:12px;background:#1f2937;border:1px solid #374151;color:#e5e7eb;font-size:13px;cursor:pointer;transition:.2s}
  .starter:hover{background:#374151}
  .msg{display:flex;align-items:flex-start;gap:8px}
  .msg.user{justify-content:flex-end}
  .bubble{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .msg.user .bubble{background:#6366f1;border-bottom-right-radius:4px}
  .msg.bot .bubble{background:#1f2937;border-bottom-left-radius:4px}
  .msg.bot .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
  .typing{color:#9ca3af;font-style:italic}
  #footer{padding:12px 16px;background:#111827;border-top:1px solid #1f2937;flex-shrink:0}
  #input-row{display:flex;gap:8px;align-items:flex-end;max-width:700px;margin:0 auto}
  #input{flex:1;background:#1f2937;color:#fff;border:1px solid #374151;border-radius:12px;padding:10px 14px;font-size:14px;resize:none;outline:none;font-family:inherit;max-height:120px;min-height:42px}
  #input:focus{border-color:#6366f1}
  #send{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #send:disabled{opacity:.4;cursor:not-allowed}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <div id="logo">🧠</div>
    <div>
      <div id="title">Aliado IA</div>
      <div id="subtitle">Fortalece, aprende seguro y avanza</div>
    </div>
  </div>
  <div id="header-right">
    <button class="hbtn" onclick="toggleLang()">English</button>
    <button class="hbtn" onclick="newSession()">Nueva sesión</button>
  </div>
</div>

<div id="chat">
  <div id="welcome">
    <div id="welcome-icon">🧠</div>
    <div id="welcome-sub">Fortalece, aprende seguro y avanza</div>
    <div id="starters">
      <button class="starter" onclick="send(this.innerText)">Tengo tarea y no entiendo por dónde empezar</button>
      <button class="starter" onclick="send(this.innerText)">Estoy frustrado con la escuela. Ayúdame a ordenar mi cabeza.</button>
      <button class="starter" onclick="send(this.innerText)">Vi una noticia en redes y no sé si creerla</button>
      <button class="starter" onclick="send(this.innerText)">Tengo un dilema con un amigo y no sé qué hacer.</button>
    </div>
  </div>
</div>

<div id="footer">
  <div id="input-row">
    <textarea id="input" rows="1" placeholder="Escribe aquí tu mensaje..." oninput="autoResize(this)"></textarea>
    <button id="send" onclick="send()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="18" height="18">
        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
      </svg>
    </button>
  </div>
</div>

<script>
const API_KEY = "REEMPLAZA_CON_TU_API_KEY";
const SYSTEM = `Eres Aliado IA, un entrenador integral de pensamiento crítico, hábitos y valores para adolescentes de 15 a 18 años. Tu función NO es hacer tareas ni dar respuestas directas. Tu función es enseñar a pensar, razonar, argumentar y decidir con criterio. Trabajas como un coach: preguntas, retas, contrastas ideas y ayudas a mejorarlas.
PRINCIPIOS: Nunca des la respuesta completa al inicio. Siempre comienza con 3 preguntas de reflexión. Exige justificación. Incluye una perspectiva contraria. Detecta falacias con respeto. Conecta con la vida real. Refuerza el esfuerzo.
ALERTAS DE SEGURIDAD: Si detectas lenguaje de autolesión o violencia, mantén tono calmado y sugiere hablar con un adulto de confianza.
TONO: Cercano, respetuoso, claro. Sin sarcasmo. Sin infantilizar. Máx 2 emojis por mensaje.
LÍMITES: No haces tareas. No sustituyes padres ni maestros. Aliado IA no enseña qué pensar. Aliado IA enseña cómo pensar.
Si el usuario escribe en inglés, responde en inglés.`;

let messages = [];
let lang = 'es';
let loading = false;

function toggleLang() {
  lang = lang === 'es' ? 'en' : 'es';
  document.querySelector('.hbtn').innerText = lang === 'es' ? 'English' : 'Español';
  document.getElementById('input').placeholder = lang === 'es' ? 'Escribe aquí tu mensaje...' : 'Type your message here...';
}

function newSession() {
  messages = [];
  const chat = document.getElementById('chat');
  chat.innerHTML = `<div id="welcome">
    <div id="welcome-icon">🧠</div>
    <div id="welcome-sub">${lang === 'es' ? 'Fortalece, aprende seguro y avanza' : 'Strengthen, learn safely and move forward'}</div>
    <div id="starters">
      <button class="starter" onclick="send(this.innerText)">${lang === 'es' ? 'Tengo tarea y no entiendo por dónde empezar' : 'I have homework and don\'t know where to start'}</button>
      <button class="starter" onclick="send(this.innerText)">${lang === 'es' ? 'Estoy frustrado con la escuela. Ayúdame a ordenar mi cabeza.' : 'I\'m frustrated with school. Help me clear my head.'}</button>
      <button class="starter" onclick="send(this.innerText)">${lang === 'es' ? 'Vi una noticia en redes y no sé si creerla' : 'I saw news on social media and don\'t know if I should believe it'}</button>
      <button class="starter" onclick="send(this.innerText)">${lang === 'es' ? 'Tengo un dilema con un amigo y no sé qué hacer.' : 'I have a dilemma with a friend and don\'t know what to do.'}</button>
    </div>
  </div>`;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function appendMsg(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  div.id = role === 'assistant' ? 'last-bot' : '';
  if (role === 'assistant') {
    div.innerHTML = `<div class="avatar">🧠</div><div class="bubble" id="bot-bubble"></div>`;
  } else {
    div.innerHTML = `<div class="bubble">${text}</div>`;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send(text) {
  const input = document.getElementById('input');
  const txt = text || input.value.trim();
  if (!txt || loading) return;
  input.value = '';
  input.style.height = 'auto';
  loading = true;
  document.getElementById('send').disabled = true;

  messages.push({ role: 'user', content: txt });
  appendMsg('user', txt);

  const botDiv = appendMsg('assistant', '');
  const bubble = document.getElementById('bot-bubble');
  bubble.innerHTML = '<span class="typing">Pensando...</span>';

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messages.slice(-4) })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Error al conectar.';
    messages.push({ role: 'assistant', content: reply });
    bubble.innerText = reply;
  } catch(e) {
    bubble.innerText = 'Error de conexión. Intenta de nuevo.';
  }

  loading = false;
  document.getElementById('send').disabled = false;
  document.getElementById('chat').scrollTop = 99999;
}
</script>
</body>
</html>
